name: Refresh match data

on:
  schedule:
    - cron: "0 6 * * *" # daily, mirrors the Dagster schedule
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run dagster asset materialize -m pipeline.definitions --select '*'
      # Pushing data changes triggers a Vercel production deploy via its GitHub App
      - run: |
          if [ -n "$(git status --porcelain web/src/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add web/src/data
            git commit -m "Data refresh: $(date -u +%F)"
            git push
          else
            echo "No new data"
          fi
